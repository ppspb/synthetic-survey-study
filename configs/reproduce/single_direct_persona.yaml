api:
  base_url: ${OPENAI_BASE_URL:-http://127.0.0.1:1234/v1}
  api_key: ${OPENAI_API_KEY:-lm-studio}
  model: ${MODEL_NAME:-qwen3.5-4b}
  temperature: 0
  max_retries: 3
  timeout_seconds: 120
  api_mode: "chat_completions"
  use_structured_output: true
  structured_output_strict: true
  max_completion_tokens: 120
  request_delay_seconds: 0.0

paths:
  data_dir: "data"
  samples_file: "samples.tsv"
  question_metadata_file: "question_metadata.json"
  outputs_dir: "outputs"
  full_value_qa_file: "data/F00011356-WVS_Cross-National_Wave_7_csv_v6_0.zip"

benchmark:
  prompt_modes:
    - no_demo
    - direct_persona
    - interview_direct
    - interview_state_guided
  questions:
    - Q46
    - Q57
    - Q59
    - Q106
    - Q158
    - Q164
    - Q199
    - Q235
  groups:
    - continent: "Europe"
      urban_rural: "Urban"
      education: "Tertiary"
    - continent: "Europe"
      urban_rural: "Rural"
      education: "Lower Secondary"
    - continent: "Asia"
      urban_rural: "Urban"
      education: "Upper to Post Secondary"
    - continent: "Africa"
      urban_rural: "Rural"
      education: "Primary or No Education"
  participants_per_group_question: 5
  explanation_max_words: 25
  random_seed: 42
  continue_on_error: true

judge:
  enabled: true
  use_llm: false
  llm_model: "qwen/qwen3-4b"
  max_retries: 2
  fail_on_judge_error: false

robustness:
  perturbations:
    - original
    - question_paraphrase
    - reverse_anchor_order
    - anchor_softened
  compare_to: "original"
  continue_on_error: true

model_management:
  enabled: true
  use_lmstudio_rest: true
  load_before_run: true
  unload_after_run: true
  context_length: null
  eval_batch_size: null
  flash_attention: null
  num_experts: null
  offload_kv_cache_to_gpu: null
